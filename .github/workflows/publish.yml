name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) — no token. Requires npm 11.5.1+, so fetch a
      # fresh npm just for publish (the runner's bundled npm is 10.x).
      #
      # Bootstrap note: OIDC needs a trusted publisher configured on npmjs for
      # this package. For the very first release of a brand-new package, either
      # configure trusted publishing first, or add an NPM_TOKEN secret and set
      #   env: { NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} }
      # on this step, then remove it once trusted publishing is live.
      - name: Publish
        run: npx -y npm@latest publish --provenance --access public
